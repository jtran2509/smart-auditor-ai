name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # JOB 1: Test
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest black
      
      - name: Run tests
        run: pytest tests/ -v
      
      - name: Check code style
        run: black --check app/ --diff
  
  # JOB 2: Build & Push Docker Image (chỉ chạy khi test thành công và là main branch)
  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/smart-auditor-ai:latest
            ${{ secrets.DOCKER_USERNAME }}/smart-auditor-ai:${{ github.sha }}
      
      - name: Image info
        run: |
          echo "✅ Docker image pushed: ${{ secrets.DOCKER_USERNAME }}/smart-auditor-ai:latest"
          echo "   Image size: $(docker images --format '{{.Size}}' ${{ secrets.DOCKER_USERNAME }}/smart-auditor-ai:latest)"
